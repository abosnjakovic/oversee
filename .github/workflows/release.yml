---
name: Release

# One-click release.
#
# Click "Run workflow" on this action. It will:
#   1. Compute the next version from Conventional Commits since the last tag.
#   2. Bump Cargo.toml + CHANGELOG.md and push the commit + tag to main.
#   3. Create the GitHub Release.
#   4. Build macOS Apple Silicon + Intel binaries, attach tarballs.
#   5. Regenerate Formula/oversee.rb with the new SHAs and push to main.
#   6. Publish to crates.io.
#
# No PR to merge, no tag input, no second trigger.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump-and-tag:
    name: Bump version + push tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      released: ${{ steps.bump.outputs.released }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      - name: Bump version + commit + tag
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          before=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          release-plz update
          after=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)

          if [ "$before" = "$after" ]; then
            echo "No release-worthy commits since v${before}. Nothing to do." >&2
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="v${after}"
          git add -A
          git commit -m "chore: release ${tag}"
          git tag "$tag"

          # Push commit then tag. Same workflow run continues, so the
          # GITHUB_TOKEN anti-loop on tag pushes does not matter here.
          git push origin main
          git push origin "$tag"

          {
            echo "version=${after}"
            echo "tag=${tag}"
            echo "released=true"
          } >> "$GITHUB_OUTPUT"
          echo "Released ${tag}"

  create-github-release:
    name: Create GitHub Release
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi

          notes="Release $VERSION

          ## Changes
          See [CHANGELOG.md](https://github.com/$REPO/blob/main/CHANGELOG.md)
          for details.

          ## Installation

          ### Homebrew (macOS)
          \`\`\`bash
          brew tap $REPO https://github.com/$REPO
          brew install oversee
          \`\`\`

          ### cargo
          \`\`\`bash
          cargo install oversee
          \`\`\`

          ### Pre-built binaries
          See assets below."

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Release $TAG" \
            --notes "$notes" \
            --draft=false \
            --prerelease=false

  build-release:
    name: Build Release
    needs: [bump-and-tag, create-github-release]
    if: needs.bump-and-tag.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: x86_64-apple-darwin
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Smoke test --version
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          out=$("./target/${TARGET}/release/oversee" --version)
          echo "$out"
          echo "$out" | grep -F "$VERSION"

      - name: Create archive
        env:
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          archive="oversee-$VERSION-$SUFFIX.tar.gz"
          tar czf "$archive" oversee
          ls -la "$archive"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: |
          archive="oversee-$VERSION-$SUFFIX.tar.gz"
          gh release upload "$TAG" \
            --repo "$REPO" \
            "target/$TARGET/release/$archive"

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: [bump-and-tag, build-release]
    if: needs.bump-and-tag.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Calculate SHA256 hashes
        id: sha256
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: |
          aarch64_url="https://github.com/$REPO/releases/download/$TAG/oversee-$VERSION-aarch64-apple-darwin.tar.gz"
          aarch64_sha256=$(curl -sL "$aarch64_url" | sha256sum | cut -d' ' -f1)
          x86_url="https://github.com/$REPO/releases/download/$TAG/oversee-$VERSION-x86_64-apple-darwin.tar.gz"
          x86_sha256=$(curl -sL "$x86_url" | sha256sum | cut -d' ' -f1)
          {
            echo "aarch64_sha256=$aarch64_sha256"
            echo "x86_sha256=$x86_sha256"
          } >> "$GITHUB_OUTPUT"
          echo "Apple Silicon: $aarch64_sha256"
          echo "Intel:         $x86_sha256"

      - name: Generate Homebrew Formula
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
          AARCH64_SHA: ${{ steps.sha256.outputs.aarch64_sha256 }}
          X86_SHA: ${{ steps.sha256.outputs.x86_sha256 }}
        run: |
          mkdir -p Formula
          cat > Formula/oversee.rb << EOF
          class Oversee < Formula
            desc "A modern system monitor for macOS with Apple Silicon GPU support"
            homepage "https://github.com/$REPO"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/$REPO/releases/download/$TAG/oversee-$VERSION-aarch64-apple-darwin.tar.gz"
                sha256 "$AARCH64_SHA"
              else
                url "https://github.com/$REPO/releases/download/$TAG/oversee-$VERSION-x86_64-apple-darwin.tar.gz"
                sha256 "$X86_SHA"
              end
            end

            def install
              bin.install "oversee"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/oversee --version")
            end
          end
          EOF
          echo "Generated formula:"
          cat Formula/oversee.rb

      - name: Commit and push formula update
        env:
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/oversee.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update oversee formula to $VERSION"

          # main may have advanced since checkout. Retry pull --rebase to
          # handle concurrent updates without wedging the job.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing on origin/main and retrying"
            git pull --rebase origin main
          done
          echo "Failed to push formula update after 3 attempts"
          exit 1

  publish-crates:
    name: Publish to crates.io
    needs: [bump-and-tag, build-release]
    if: needs.bump-and-tag.outputs.released == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --allow-dirty
